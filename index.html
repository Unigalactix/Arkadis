<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkadis: The Hidden Continent</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --premium-bg-top: #fcfaf5;
            --premium-bg-bottom: #f2ede2;
            --premium-text: #1c2430;
            --premium-accent: #9a6a2f;
            --premium-accent-muted: rgba(154, 106, 47, 0.3);
            --premium-header-bg: rgba(252, 250, 245, 0.8);
            --premium-panel-bg: rgba(255, 255, 255, 0.9);
            --premium-panel-border: rgba(154, 106, 47, 0.14);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, var(--premium-bg-top) 0%, var(--premium-bg-bottom) 100%);
            color: var(--premium-text);
        }

        h1,
        h2,
        h3,
        .serif {
            font-family: 'Playfair Display', serif;
        }

        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            height: 300px;
        }

        @media (min-width: 768px) {
            .chart-container {
                height: 350px;
            }
        }

        .nav-btn {
            color: rgba(28, 36, 48, 0.72);
            letter-spacing: 0.015em;
            border-radius: var(--radius-sm);
        }

        .nav-btn:hover {
            color: var(--premium-text);
            border-bottom-color: var(--premium-accent-muted) !important;
        }

        .nav-active {
            border-bottom: 1px solid var(--premium-accent);
            color: var(--premium-accent);
        }

        .glass-panel {
            background: var(--premium-panel-bg);
            border: 1px solid var(--premium-panel-border);
            border-radius: var(--radius-md);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 12px 34px -22px rgba(17, 24, 39, 0.35);
        }

        .gold-border {
            border-left: 4px solid var(--premium-accent);
        }

        .site-header {
            background: var(--premium-header-bg);
            border-bottom: 1px solid rgba(154, 106, 47, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 28px -24px rgba(17, 24, 39, 0.55);
        }

        #brand-mark {
            border-radius: var(--radius-md);
            box-shadow: 0 10px 24px -18px rgba(15, 23, 42, 0.7);
            color: var(--premium-accent);
            position: relative;
            overflow: hidden;
            filter: saturate(0.86);
        }

        #brand-mark::before {
            content: '';
            position: absolute;
            inset: 1px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: calc(var(--radius-md) - 2px);
            pointer-events: none;
        }

        #main-title {
            color: var(--premium-text);
        }

        #mobile-nav {
            background: rgba(252, 250, 245, 0.92);
            border-bottom: 1px solid rgba(154, 106, 47, 0.12);
        }

        #mobile-nav button {
            border-radius: var(--radius-sm);
        }

        .timeline-item {
            position: relative;
            padding-left: 2rem;
            padding-bottom: 2rem;
            border-left: 2px solid #e5e7eb;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -0.4rem;
            top: 0;
            width: 0.8rem;
            height: 0.8rem;
            border-radius: 50%;
            background: #b45309;
        }

        .timeline-item:last-child {
            border-left: none;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* UNVEILED MODE (REBEL THEME) */
        body.unveiled-mode {
            background-color: #0c0a09;
            color: #fca5a5;
            filter: contrast(1.1) brightness(0.9);
        }

        .unveiled-mode header {
            background-color: #1c1917;
            border-bottom: 2px solid #7f1d1d;
        }

        .unveiled-mode header h1 {
            color: #f87171;
        }

        .unveiled-mode .nav-btn {
            color: #fca5a5;
        }

        .unveiled-mode .nav-active {
            border-bottom-color: #7f1d1d;
            color: #ef4444;
        }

        .unveiled-mode .glass-panel {
            background: rgba(28, 25, 23, 0.95);
            border-color: rgba(127, 29, 29, 0.4);
        }

        .glitch-text {
            position: relative;
            display: inline-block;
        }

        .unveiled-mode .glitch-text::before,
        .unveiled-mode .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        .unveiled-mode .glitch-text::before {
            color: #ef4444;
            z-index: -1;
            animation: glitch 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
        }

        .unveiled-mode .glitch-text::after {
            color: #06b6d4;
            z-index: -2;
            animation: glitch 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) reverse both infinite;
        }

        @keyframes glitch {
            0% {
                transform: translate(0);
            }

            20% {
                transform: translate(-2px, 2px);
            }

            40% {
                transform: translate(-2px, -2px);
            }

            60% {
                transform: translate(2px, 2px);
            }

            80% {
                transform: translate(2px, -2px);
            }

            100% {
                transform: translate(0);
            }
        }

        .toggle-unveiled {
            cursor: pointer;
            transition: all 0.3s;
        }

        .unveiled-mode .toggle-unveiled {
            color: #ef4444;
            text-shadow: 0 0 10px #ef4444;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .mask-linear-fade {
            mask-image: linear-gradient(to right, transparent, black 10px, black 95%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 16px, black calc(100% - 16px), transparent);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="site-header sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-4">
                    <div id="brand-mark"
                        class="w-12 h-12 bg-slate-900 flex items-center justify-center text-2xl border border-orange-900/20">
                        <i class="fas fa-mountain" id="logo-icon"></i>
                    </div>
                    <div>
                        <h1 class="text-3xl font-orbitron font-black tracking-widest text-slate-900 uppercase"
                            id="main-title">
                            ARKADIS
                        </h1>
                    </div>
                </div>

                <!-- Unveiled Toggle -->
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter hidden md:block"
                        id="toggle-label"> </span>
                    <button id="mode-toggle"
                        class="toggle-unveiled w-10 h-10 rounded-full flex items-center justify-center border border-gray-200 hover:border-orange-500 transition-all">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <!-- Desktop Nav (Scrollable) -->
                <nav
                    class="hidden xl:flex items-center gap-6 overflow-x-auto scrollbar-hide whitespace-nowrap mask-linear-fade flex-1 px-4">
                    <button onclick="switchTab('overview')"
                        class="nav-btn nav-active px-1 pt-1 text-sm font-medium transition-colors border-b-2 border-transparent hover:border-orange-200"
                        data-tab="overview">Overview</button>
                    <button onclick="switchTab('history')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="history">Origins</button>
                    <button onclick="switchTab('characters')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="characters">Characters</button>
                    <button onclick="switchTab('stories')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="stories">Stories</button>
                    <button onclick="switchTab('episodes')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="episodes">Episodes</button>
                    <button onclick="switchTab('society')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="society">The Order</button>
                    <button onclick="switchTab('defense')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="defense">Defense</button>
                    <button onclick="switchTab('flora')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="flora">Flora</button>
                    <button onclick="switchTab('economy')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="economy">Economy</button>
                    <button onclick="switchTab('map')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="map">Map</button>
                    <button onclick="switchTab('daily')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="daily">Daily Life</button>
                    <button onclick="switchTab('geology')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="geology">Geo-Tech</button>
                    <button onclick="switchTab('sports')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="sports">Training</button>
                    <button onclick="switchTab('disasters')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="disasters">Disasters</button>
                    <button onclick="switchTab('currency')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="currency">Currency</button>
                    <button onclick="switchTab('wiretap')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="wiretap">Wiretap</button>
                    <button onclick="switchTab('chess')"
                        class="nav-btn px-1 pt-1 text-sm font-medium text-gray-500 transition-colors border-b-2 border-transparent hover:border-gray-300"
                        data-tab="chess">The Game</button>
                </nav>

                <!-- Mobile Menu Toggle -->
                <button onclick="document.getElementById('mobile-nav').classList.toggle('hidden')"
                    class="xl:hidden text-gray-500"><i class="fas fa-bars"></i></button>
            </div>
        </div>

        <!-- Mobile Nav -->
        <div id="mobile-nav" class="hidden xl:hidden p-4 grid grid-cols-2 gap-2">
            <button onclick="switchTab('overview')"
                class="text-left py-2 px-4 hover:bg-orange-50 rounded">Overview</button>
            <button onclick="switchTab('history')"
                class="text-left py-2 px-4 hover:bg-orange-50 rounded">Origins</button>
            <button onclick="switchTab('characters')"
                class="text-left py-2 px-4 hover:bg-orange-50 rounded">Characters</button>
            <button onclick="switchTab('stories')"
                class="text-left py-2 px-4 hover:bg-orange-50 rounded">Stories</button>
            <button onclick="switchTab('episodes')"
                class="text-left py-2 px-4 hover:bg-orange-50 rounded">Episodes</button>
            <button onclick="switchTab('society')" class="text-left py-2 px-4 hover:bg-orange-50 rounded">The
                Order</button>
            <button onclick="switchTab('defense')"
                class="text-left py-2 px-4 hover:bg-orange-50 rounded">Defense</button>
            <button onclick="switchTab('flora')" class="text-left py-2 px-4 hover:bg-orange-50 rounded">Flora</button>
            <button onclick="switchTab('economy')"
                class="text-left py-2 px-4 hover:bg-orange-50 rounded">Economy</button>
            <button onclick="switchTab('map')" class="text-left py-2 px-4 hover:bg-orange-50 rounded">Map</button>
            <button onclick="switchTab('daily')" class="text-left py-2 px-4 hover:bg-orange-50 rounded">Daily
                Life</button>
            <button onclick="switchTab('geology')"
                class="text-left py-2 px-4 hover:bg-orange-50 rounded">Geo-Tech</button>
            <button onclick="switchTab('sports')"
                class="text-left py-2 px-4 hover:bg-orange-50 rounded">Training</button>
            <button onclick="switchTab('disasters')"
                class="text-left py-2 px-4 hover:bg-orange-50 rounded">Disasters</button>
            <button onclick="switchTab('currency')"
                class="text-left py-2 px-4 hover:bg-orange-50 rounded">Currency</button>
            <button onclick="switchTab('chess')" class="text-left py-2 px-4 hover:bg-orange-50 rounded">The
                Game</button>
        </div>
    </header>

    <!-- Main Content Container -->
    <main id="main-content" class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
        <!-- Tab content dynamically injected here -->
        <div class="flex items-center justify-center h-full">
            <div class="animate-pulse text-gray-400">Loading Archive...</div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center text-xs font-mono">
            <p>ARKADIS INTERNAL NETWORK // EYES ONLY</p>
            <p class="mt-2 text-slate-600">Unauthorized access will trigger Erasure Protocols.</p>
        </div>
    </footer>

    <!-- Boot Overlay -->
    <div id="boot-overlay" class="fixed inset-0 z-[200]"></div>

    <!-- Orchestrator -->
    <script type="module" src="js/app.js"></script>

    <!-- News Ticker Placeholder -->
    <div id="news-ticker-container"></div>
</body>

</html>
